name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  test:
    name: Testes e cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Rodar testes com cobertura
        run: npm run test:coverage

      - name: Upload do relatorio de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  lint:
    name: Lint e type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run type-check

  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build de producao
        run: npm run build
        env:
          OLLAMA_URL: http://localhost:11434
          OLLAMA_MODEL: qwen2.5-coder:7b

  e2e:
    name: Playwright E2E funcional
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Chromium do Playwright
        run: npx playwright install --with-deps chromium

      - name: Build de producao
        run: npm run build
        env:
          OLLAMA_URL: http://localhost:11434
          OLLAMA_MODEL: qwen2.5-coder:7b

      - name: Rodar testes E2E funcionais
        run: npm run test:e2e -- --grep-invert "Regressao visual"
        env:
          CI: true
          OLLAMA_URL: http://localhost:11434
          OLLAMA_MODEL: qwen2.5-coder:7b

      - name: Upload do relatorio Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-linux
          path: playwright-report/
          retention-days: 14

  visual:
    name: Playwright visual Windows
    runs-on: windows-latest
    needs: [build]

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Chromium do Playwright
        run: npx playwright install chromium

      - name: Build de producao
        run: npm run build
        env:
          OLLAMA_URL: http://localhost:11434
          OLLAMA_MODEL: qwen2.5-coder:7b

      - name: Rodar snapshots visuais
        run: npm run test:e2e -- e2e/visual.spec.ts
        env:
          CI: true
          OLLAMA_URL: http://localhost:11434
          OLLAMA_MODEL: qwen2.5-coder:7b

      - name: Upload do relatorio visual
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-visual-windows
          path: playwright-report/
          retention-days: 14
